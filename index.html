<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>最高指揮部 - 終極實戰版 v13.0</title>
    <style>
        /* (樣式維持不變) */
        body { background-color: #0b0f19; color: #cbd5e1; font-family: sans-serif; padding: 24px; }
        .refresh-btn { background-color: #7c3aed; color: #ffffff; padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; }
        .api-input { background: #0f172a; border: 1px solid #4338ca; color: #fff; padding: 10px; width: 400px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ 指揮部戰術控制台 v13.0</h1>
        <div class="api-vault">
            <input type="password" id="groq-key" class="api-input" placeholder="請貼上 API Key" onblur="saveApiKey()">
            <button class="refresh-btn" onclick="triggerActualNetworkFetch()">🔄 實質發動網路抓取</button>
        </div>
        
        <div class="section-title">📊 實戰數據監控區</div>
        <div class="panel-card">
            <h3>📈 美股/台股數據 (即時抓取)</h3>
            <div id="val-data" class="main-value">等待發動指令...</div>
            <div id="status-display" style="color: #fbbf24; font-size: 12px; margin-top: 10px;">尚未連線</div>
        </div>
    </div>

<script>
    function saveApiKey() { localStorage.setItem('groq_api_key', document.getElementById('groq-key').value); }
    
    // 🛡️ 實質聯網核心函數
    async function triggerActualNetworkFetch() {
        let key = localStorage.getItem('groq_api_key');
        let display = document.getElementById('val-data');
        let status = document.getElementById('status-display');
        
        if(!key) { alert("🚨 請輸入 API Key！"); return; }
        
        status.innerText = "📡 正在向 Groq 發送實質請求...";
        
        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'llama3-70b-8192',
                    messages: [{ role: 'user', content: "請提供當前(2026/05)的台股加權指數和道瓊指數的最新價格，僅用一句話回傳" }]
                })
            });
            
            const result = await response.json();
            const content = result.choices[0].message.content;
            
            // 實質更新內容！
            display.innerText = content;
            status.innerHTML = `<span style="color:#10b981;">✅ 抓取成功！時間：${new Date().toLocaleTimeString()}</span>`;
            
        } catch (e) {
            status.innerText = "❌ 請求失敗，請確認 API Key 是否有效。";
        }
    }
</script>
</body>
</html>
