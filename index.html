<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>最高指揮部 - v18.0_Final_Gemini</title>
    <style>
        body { background-color: #0b0f19; color: #cbd5e1; font-family: sans-serif; padding: 24px; }
        .btn-sync { background-color: #e11d48; color: white; padding: 20px 40px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; font-size: 18px; }
        #output { background: #1e293b; padding: 20px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; color: #fff; font-family: monospace; }
    </style>
</head>
<body>
    <h1>🛡️ 指揮部戰情室 (Gemini 核心驅動版)</h1>
    <button class="btn-sync" onclick="syncData()">🔄 執行最終同步</button>
    <div id="status" style="margin-top: 10px;">準備就緒...</div>
    <div id="output">等待發動指令...</div>

<script>
    // 🛡️ 金鑰已剛性植入
    const API_KEY = "AIzaSyBfBFIUqx3UziS_zHx0UN1HJQI2nzrGrDU";

    async function syncData() {
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        
        status.innerText = "📡 正在調動 Gemini 特遣隊搜尋最新財經數據...";
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "查詢 2026年5月28日最新的台股加權指數、道瓊指數、美元兌台幣匯率，直接回傳數據，不要任何程式碼。" }] }]
                })
            });

            const data = await response.json();
            // 🛡️ 暴力顯示法：只要有數據就吐出來，不再解析
            const resultText = data.candidates[0].content.parts[0].text;
            output.innerText = resultText;
            status.innerHTML = `<span style="color:#10b981;">✅ 數據回傳成功！時間：${new Date().toLocaleTimeString()}</span>`;
        } catch (e) {
            output.innerText = "❌ 請求失敗，詳細內容：" + e.message;
            status.innerText = "❌ 發生錯誤";
        }
    }
</script>
</body>
</html>
