<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>最高指揮部 - 防守雷達 v4.52</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        .card { background-color: #161b22; border: 1px solid #30363d; padding: 15px; margin-bottom: 10px; border-radius: 6px; }
        .target-price { color: #f85149; font-weight: bold; }
        .status-sold { color: #ffab70; font-weight: bold; }
    </style>
</head>
<body>
    <div style="max-width: 800px; margin: 0 auto;">
        <h1>最高指揮部 - v4.52 (手動校準版)</h1>
        <div class="card">
            <h3>FSI011 戰略監控面板</h3>
            <p>目前狀態：<span class="status-sold">【已全數贖回】等待回補</span></p>
            <p>回補死線：<span class="target-price">28.35 元</span></p>
            <p>戰術提示：每日 21:30 後請人工查詢基富通最新淨值，並在此回報。</p>
        </div>
        <div id="statusReport"></div>
    </div>

    <script>
        const target = 28.35;
        function updateStatus(currentNav) {
            const report = document.getElementById('statusReport');
            const diff = currentNav - target;
            report.innerHTML = `<div class="card">最新淨值: ${currentNav} 元 (距離目標價差: ${diff.toFixed(2)} 元)</div>`;
        }
        // 初始狀態
        updateStatus(0); 
    </script>
</body>
</html>
