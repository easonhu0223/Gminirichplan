<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>最高指揮部 - v16.0_NoKey_Stable</title>
    <style>
        body { background-color: #0b0f19; color: #cbd5e1; font-family: sans-serif; padding: 24px; }
        .refresh-btn { background-color: #10b981; color: #ffffff; padding: 15px 30px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; }
        .main-value { background: #1e293b; padding: 20px; border-radius: 8px; color: #fff; font-family: monospace; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🛡️ 指揮部戰術控制台 v16.0 (免金鑰・穩定版)</h1>
    <button class="refresh-btn" onclick="fetchStockData()">🔄 刷新數據 (無需金鑰)</button>
    <div id="status" style="margin-top: 10px;">準備就緒...</div>
    <div id="val-data" class="main-value">點擊按鈕獲取台股/美股最新指標...</div>

<script>
    async function fetchStockData() {
        let display = document.getElementById('val-data');
        let status = document.getElementById('status');
        
        status.innerText = "📡 正在連線市場數據庫...";
        
        try {
            // 使用 Twelve Data 的公開免費節點，不需要 Key，只要連線即可獲取市場數據
            const response = await fetch('https://api.twelvedata.com/time_series?symbol=AAPL,IXIC,^TWII&interval=1min&outputsize=1&apikey=demo');
            const data = await response.json();
            
            // 簡化顯示
            display.innerText = JSON.stringify(data, null, 2);
            status.innerHTML = `<span style="color:#10b981;">✅ 數據更新成功：${new Date().toLocaleTimeString()}</span>`;
        } catch (e) {
            status.innerHTML = `<span style="color:#f43f5e;">❌ 連線異常，請確認網路或稍後重試。</span>`;
        }
    }
</script>
</body>
</html>
